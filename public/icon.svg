<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient - deep vibrant blue to indigo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- White-gold accent for the key/home element -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <!-- Subtle inner shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect width="500" height="500" x="6" y="6" rx="106" fill="none" stroke="#fff" stroke-width="2" stroke-opacity="0.12"/>

  <!-- Main icon group - Building with "PG" lettermark -->
  <g filter="url(#shadow)">
    <!-- Building silhouette -->
    <path d="M136,390 V175 C136,155 152,140 172,140 H340 C360,140 376,155 376,175 V390 Z"
          fill="#fff" fill-opacity="0.15" stroke="url(#accent)" stroke-width="8" stroke-linejoin="round"/>

    <!-- Roof / triangle top -->
    <path d="M120,148 L256,72 L392,148" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Chimney -->
    <rect x="320" y="82" width="22" height="50" rx="4" fill="#fff" fill-opacity="0.7"/>

    <!-- Window row 1 -->
    <rect x="176" y="178" width="44" height="38" rx="8" fill="#fff" fill-opacity="0.85"/>
    <rect x="292" y="178" width="44" height="38" rx="8" fill="#fff" fill-opacity="0.85"/>

    <!-- Window row 2 -->
    <rect x="176" y="240" width="44" height="38" rx="8" fill="#fff" fill-opacity="0.6"/>
    <rect x="292" y="240" width="44" height="38" rx="8" fill="#fff" fill-opacity="0.6"/>

    <!-- Door / entrance -->
    <path d="M226,390 V322 C226,308 237,298 256,298 C275,298 286,308 286,322 V390 Z"
          fill="#fff" fill-opacity="0.9" stroke="#fff" stroke-width="3"/>
    <!-- Door handle -->
    <circle cx="274" cy="348" r="5" fill="#6366F1"/>

    <!-- Bed icon inside bottom-left window area -->
    <g transform="translate(176, 310)">
      <path d="M0,28 H44 M0,18 C0,12 4,8 10,8 H34 C40,8 44,12 44,18 V28 M0,28 V22 M44,28 V22"
            stroke="#fff" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.5"/>
    </g>
  </g>

  <!-- "PG" text mark - bold, modern, easily readable -->
  <text x="256" y="452" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900"
        font-size="52" fill="#fff" letter-spacing="8" opacity="0.9">PG</text>
</svg>
