<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Ultra Vibrant Neon Gradient: Emerald -> Cyan -> Electric Blue -->
    <linearGradient id="pgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="40%" stop-color="#10B981"/>
      <stop offset="75%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <!-- Glossy Highlight Overlay -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Hard High-Contrast Drop Shadow for 16px Tab Scalability -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#022C22" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Base Squircle with Neon Emerald/Cyan Gradient -->
  <rect width="512" height="512" rx="140" fill="url(#pgGradient)"/>

  <!-- Glossy Top Shine -->
  <rect width="512" height="512" rx="140" fill="url(#gloss)"/>

  <!-- Bold Crisp White Outer Ring -->
  <rect width="492" height="492" x="10" y="10" rx="130" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-opacity="0.35"/>

  <!-- ULTRA-BOLD HIGH-CONTRAST ICON: House Roof + Stylized "P" Monogram -->
  <g filter="url(#iconShadow)" transform="translate(0, 10)">

    <!-- Roof Peak (Bold House Top) -->
    <path d="M256,86 L396,196 C406,204 402,220 388,220 H358 V376 C358,396 342,412 322,412 H190 C170,412 154,396 154,376 V220 H124 C110,220 106,204 116,196 Z"
          fill="#FFFFFF"/>

    <!-- Cutout: Negative Space "P" and "G" Monogram inside the House -->
    <!-- "P" Left Loop Cutout -->
    <path d="M214,242 H274 C298,242 314,256 314,278 C314,300 298,314 274,314 H254 V366 H214 V242 Z
             M254,274 V282 H272 C278,282 284,278 284,278 C284,278 284,274 272,274 Z"
          fill="url(#pgGradient)"/>

  </g>

  <!-- Glowing Corner Accent Dot -->
  <circle cx="410" cy="102" r="16" fill="#FACC15"/>
  <circle cx="410" cy="102" r="26" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.8"/>
</svg>
